name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    # Advisory for now: the existing tree has formatting/lint/type debt.
    # These steps report issues without failing the build; flip
    # continue-on-error to false per tool as the backlog is burned down.
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Check formatting (black)
        continue-on-error: true
        run: black --check csproxy tests

      - name: Lint (flake8)
        continue-on-error: true
        run: flake8 csproxy tests

      - name: Type check (mypy)
        continue-on-error: true
        run: mypy csproxy

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest -q --tb=short --cov=csproxy --cov-report=term-missing
